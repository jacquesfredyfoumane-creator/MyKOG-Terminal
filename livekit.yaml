port: 7880
bind_addresses:
  - "0.0.0.0"

# API configuration (clés MyKOG)
keys:
  devkey: secret

# WebRTC configuration
rtc:
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false
  # node_ip: "YOUR_PUBLIC_IP"  # décommenter pour la production

# Room configuration
room:
  auto_create: true
  empty_timeout: 300   # 5 minutes avant suppression si vide
  max_participants: 500

# Logging
logging:
  level: info
  sample: false

# TURN server désactivé (développement local)
turn:
  enabled: false
