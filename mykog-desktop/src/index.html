<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyKOG Desktop</title>
  <link rel="stylesheet" href="styles/theme.css">
  <link rel="stylesheet" href="styles/typography.css">
  <link rel="stylesheet" href="styles/components.css">
  <!-- HLS.js pour la lecture de streams HLS -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
  <div class="app-container">
    <!-- Header avec contrôles de fenêtre -->
    <header class="app-header" id="app-header">
      <div class="window-controls">
        <button class="window-control minimize" id="btn-minimize">−</button>
        <button class="window-control maximize" id="btn-maximize">□</button>
        <button class="window-control close" id="btn-close">×</button>
      </div>
    </header>

    <!-- Layout principal -->
    <div class="app-layout">
      <!-- Sidebar -->
      <aside class="sidebar" id="sidebar">
        <!-- Logo -->
        <div class="sidebar-logo">
          <h1 class="headline-small">MyKOG</h1>
        </div>

        <!-- Navigation -->
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-screen="home">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">Accueil</span>
          </a>
          <a href="#" class="nav-item" data-screen="browse">
            <span class="nav-icon">🔍</span>
            <span class="nav-label">Parcourir</span>
          </a>
          <a href="#" class="nav-item" data-screen="library">
            <span class="nav-icon">📚</span>
            <span class="nav-label">Bibliothèque</span>
          </a>
          <a href="#" class="nav-item" data-screen="live">
            <span class="nav-icon">📺</span>
            <span class="nav-label">Live</span>
          </a>
        </nav>
      </aside>

      <!-- Contenu principal -->
      <main class="main-content" id="main-content">
        <!-- Les écrans seront chargés ici dynamiquement -->
        <div id="screen-container"></div>
      </main>
    </div>

    <!-- Player fixe en bas -->
    <footer class="player-bar" id="player-bar">
      <div class="player-content">
        <div class="player-info">
          <div class="player-artwork"></div>
          <div class="player-details">
            <div class="player-title">Aucune lecture</div>
            <div class="player-artist">MyKOG</div>
          </div>
        </div>

        <div class="player-controls">
          <button class="player-btn" id="btn-shuffle">🔀</button>
          <button class="player-btn" id="btn-prev">⏮</button>
          <button class="player-btn player-btn-primary" id="btn-play">▶</button>
          <button class="player-btn" id="btn-next">⏭</button>
          <button class="player-btn" id="btn-repeat">🔁</button>
        </div>

        <div class="player-progress">
          <span class="player-time">0:00</span>
          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>
          <span class="player-time">0:00</span>
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="renderer/main.js"></script>
</body>
</html>
