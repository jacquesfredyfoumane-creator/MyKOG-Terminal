<!DOCTYPE html>
<html lang="fr">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <!-- Viewport optimisé pour mobile -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
  
  <!-- Description et métadonnées -->
  <meta name="description" content="MyKOG - Application mobile pour écouter les enseignements, suivre les lives et consulter le calendrier des événements de l'église.">
  <meta name="keywords" content="MyKOG, église, enseignements, culte, live streaming, calendrier">
  <meta name="author" content="MyKOG">
  
  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="MyKOG - Enseignements et Lives">
  <meta property="og:description" content="Application mobile pour écouter les enseignements, suivre les lives et consulter le calendrier des événements de l'église.">
  <meta property="og:image" content="icons/Icon-512.png">
  <meta property="og:url" content="https://mykog.app">
  <meta property="og:site_name" content="MyKOG">
  <meta property="og:locale" content="fr_FR">
  
  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="MyKOG - Enseignements et Lives">
  <meta name="twitter:description" content="Application mobile pour écouter les enseignements, suivre les lives et consulter le calendrier des événements de l'église.">
  <meta name="twitter:image" content="icons/Icon-512.png">
  
  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyKOG">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">
  
  <!-- Android / Chrome -->
  <meta name="theme-color" content="#1a1a2e">
  <meta name="msapplication-TileColor" content="#1a1a2e">
  <meta name="msapplication-navbutton-color" content="#1a1a2e">
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="shortcut icon" type="image/png" href="favicon.png"/>

  <title>MyKOG - Enseignements et Lives</title>
  <link rel="manifest" href="manifest.json">

<body>
  <script src="flutter_bootstrap.js" async></script>
