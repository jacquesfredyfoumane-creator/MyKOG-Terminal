org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
android.defaults.buildfeatures.buildconfig=true
android.nonTransitiveRClass=false
android.nonFinalResIds=false

# Configuration réseau pour connexions lentes
org.gradle.daemon=true
org.gradle.parallel=true
org.gradle.configureondemand=true

# JVM Toolchain configuration for consistent Java version (AGP 8.9.1 requires Java 17)
org.gradle.java.home=/usr/lib/jvm/java-17-openjdk-amd64

# Timeouts augmentés pour connexions lentes
systemProp.http.connectionTimeout=60000
systemProp.http.socketTimeout=60000
systemProp.https.connectionTimeout=60000
systemProp.https.socketTimeout=60000

# Retries pour téléchargements
org.gradle.internal.http.connectionTimeout=60000
org.gradle.internal.http.socketTimeout=60000

# Utiliser init script pour forcer les repositories
org.gradle.init.daemon=true
