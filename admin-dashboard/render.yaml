services:
  # Service Web pour le Dashboard Admin
  - type: web
    name: mykog-admin-dashboard
    env: node
    plan: free
    repo: https://github.com/jacquesfredyfoumane-creator/MyKOG-Terminal
    rootDir: admin-dashboard
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://mykog-backend-api.onrender.com/api

  # Service Private pour le Veilleur (ping automatique)
  - type: private
    name: mykog-admin-veilleur
    env: node
    plan: free
    repo: https://github.com/jacquesfredyfoumane-creator/MyKOG-Terminal
    rootDir: admin-dashboard
    buildCommand: npm ci
    startCommand: node veilleur.js
    healthCheckPath: /
    healthCheckTimeout: 30
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DASHBOARD_URL
        value: https://mykog-admin-dashboard.onrender.com
      - key: PING_INTERVAL
        value: 840000  # 14 minutes en millisecondes
