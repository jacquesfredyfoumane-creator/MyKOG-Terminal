# Charger le module RTMP
load_module modules/ngx_rtmp_module.so;

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

# Configuration RTMP
rtmp {
    server {
        listen 1935;  # Port RTMP standard
        chunk_size 4096;
        allow publish all;
        allow play all;

        # Application pour les live streams
        application live {
            live on;
            
            # Désactiver l'enregistrement (optionnel)
            record off;
            
            # Configuration HLS (désactivé - on utilise FFmpeg pour transcodage)
            # hls on;
            # hls_path /var/www/html/hls;
            # hls_fragment 2s;
            # hls_playlist_length 10s;
            # hls_continuous on;
            # hls_cleanup on;
            # hls_nested on;
            
            # Note: Le transcodage FFmpeg génère les fichiers HLS avec compatibilité universelle
            
            # Qualités multiples (optionnel - pour plus tard)
            # hls_variant _720p2628kbs BANDWIDTH=2628000,RESOLUTION=1280x720;
            # hls_variant _480p1128kbs BANDWIDTH=1128000,RESOLUTION=854x480;
            # hls_variant _360p878kbs BANDWIDTH=878000,RESOLUTION=640x360;
            # hls_variant _240p528kbs BANDWIDTH=528000,RESOLUTION=426x240;
            
            # Notify pour les événements (optionnel)
            # on_publish http://localhost:3000/api/lives/rtmp/on_publish;
            # on_publish_done http://localhost:3000/api/lives/rtmp/on_publish_done;
        }
    }
}

# Configuration HTTP pour servir les fichiers HLS
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;

    server {
        listen 8080;
        server_name localhost;

        # Servir les fichiers HLS
        location /hls {
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            root /var/www/html;
            add_header 'Cache-Control' 'no-cache';
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            
            # CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*';
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
                add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }

        # Statut RTMP (optionnel)
        location /stat {
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            root /usr/share/nginx/html;
        }
    }
}

